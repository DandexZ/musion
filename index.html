<script src="lib/js/midi/audioDetect.js"></script>
<script src="lib/js/midi/gm.js"></script>

<script src="lib/js/midi/plugin.audiotag.js"></script>
<script src="lib/js/midi/plugin.webaudio.js"></script>

  <style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* CRT Scanline overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.06) 2px,
    rgba(0,0,0,0.06) 4px
  );
  pointer-events: none;
  z-index: 999;
}

body {
  font-family: 'Press Start 2P', monospace;
  background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 30%, #1e2a5e 60%, #1a1a3e 100%);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  padding: 76px 20px 20px;
  box-shadow: inset 0 0 80px rgba(107,197,255,0.05);
}

.header {
  text-align: center;
  margin-bottom: 20px;
  position: relative;
  padding: 14px 24px;
  border: 3px solid #FF6B9D;
  background: rgba(26,26,62,0.7);
  box-shadow:
    0 0 12px rgba(255,107,157,0.3),
    inset 0 0 20px rgba(107,197,255,0.08);
}
.header::before, .header::after {
  content: '◆';
  position: absolute;
  color: #6BC5FF;
  font-size: 10px;
  text-shadow: 0 0 6px rgba(107,197,255,0.6);
}
.header::before { top: -8px; left: 12px; }
.header::after { bottom: -8px; right: 12px; }

.header h1 {
  color: #FF85B3;
  font-size: 22px;
  letter-spacing: 3px;
  text-shadow:
    0 0 10px rgba(255,107,157,0.5),
    3px 3px 0 #2d1b4e,
    -1px -1px 0 rgba(107,197,255,0.3);
}
.header h1 span {
  color: #6BC5FF;
  text-shadow:
    0 0 10px rgba(107,197,255,0.5),
    3px 3px 0 #2d1b4e;
}

.header .subtitle {
  color: #C084FC;
  font-size: 8px;
  margin-top: 10px;
  letter-spacing: 2px;
  text-shadow: 0 0 8px rgba(192,132,252,0.3);
}

#loading-bar-container {
  width: 340px;
  max-width: 80vw;
  height: 14px;
  background: #2a1a3e;
  border: 3px solid #FF6B9D;
  margin: 14px auto 0;
  overflow: hidden;
  transition: opacity 0.4s;
  box-shadow: 0 0 8px rgba(255,107,157,0.25);
  padding: 2px;
}

#loading-bar {
  height: 100%;
  width: 0%;
  background: repeating-linear-gradient(
    90deg,
    #6BC5FF 0px, #FF6B9D 8px,
    #6BC5FF 8px, #FF6B9D 16px
  );
  transition: width 0.2s ease;
  image-rendering: pixelated;
}

#loading-text {
  color: #B3E4FF;
  font-size: 8px;
  text-align: center;
  margin-top: 8px;
  text-shadow: 0 0 6px rgba(107,197,255,0.3);
}
#loading-text.loaded { color: #FF85B3; text-shadow: 0 0 6px rgba(255,133,179,0.5); }

/* Piano container — 8-bit console frame */
.piano-container {
  position: relative;
  padding: 28px 18px 18px;
  background: linear-gradient(180deg, #1e1a3e 0%, #16122a 100%);
  border: 4px solid #6BC5FF;
  box-shadow:
    0 0 20px rgba(107,197,255,0.2),
    inset 0 0 30px rgba(0,0,0,0.6);
  overflow-x: auto;
  max-width: 100%;
}

/* 8-bit corner pixels */
.piano-container::before {
  content: '';
  position: absolute;
  top: -6px; left: -6px;
  width: 12px; height: 12px;
  background: #FF6B9D;
  box-shadow: 0 0 8px rgba(255,107,157,0.5);
}
.piano-container::after {
  content: '';
  position: absolute;
  top: -6px; right: -6px;
  width: 12px; height: 12px;
  background: #6BC5FF;
  box-shadow: 0 0 8px rgba(107,197,255,0.5);
}

/* Retro brand label on frame */
.piano-container .brand-tag {
  position: absolute;
  top: -12px; left: 50%;
  transform: translateX(-50%);
  background: #1a1a3e;
  padding: 2px 12px;
  border: 2px solid #FF6B9D;
  color: #FF85B3;
  font-size: 7px;
  letter-spacing: 3px;
  z-index: 5;
  white-space: nowrap;
  box-shadow: 0 0 6px rgba(255,107,157,0.2);
}

.piano-wrapper {
  position: relative;
  display: flex;
  padding: 0;
}

/* White keys — 8-bit pixel style */
.white-keys {
  display: flex;
  position: relative;
  z-index: 1;
}

.white-key {
  width: 58px;
  height: 210px;
  background: linear-gradient(180deg, #f0e8f8 0%, #e0d4ee 100%);
  border: 2px solid #8a7aa0;
  border-radius: 0;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 10px;
  position: relative;
  margin-right: -1px;
  box-shadow:
    2px 2px 0 rgba(0,0,0,0.2),
    inset 0 -3px 6px rgba(0,0,0,0.06);
  transition:
    background 0.06s,
    box-shadow 0.06s,
    transform 0.04s;
  image-rendering: pixelated;
}

.white-key:first-child { border-left-width: 2px; }
.white-key:last-child { border-right-width: 2px; }

.white-key:hover {
  background: linear-gradient(180deg, #f8f0ff 0%, #e8daf4 100%);
}

.white-key.active {
  background: linear-gradient(180deg, #B3E4FF 0%, #6BC5FF 100%);
  transform: translateY(3px);
  box-shadow:
    1px 1px 0 rgba(0,0,0,0.2),
    inset 0 -1px 0 rgba(107,197,255,0.4),
    0 0 12px rgba(107,197,255,0.4);
  border-color: #4a8abf;
}

.white-key .key-label {
  color: #6a5a80;
  font-size: 9px;
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 0;
}
.white-key.active .key-label { color: #3a5a8f; }

.white-key .note-label {
  color: #9a8ab0;
  font-size: 7px;
  font-family: 'Press Start 2P', monospace;
  margin-top: 4px;
  letter-spacing: 0;
}

/* Black keys */
.black-keys {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 138px;
  pointer-events: none;
  z-index: 2;
}

.black-key {
  position: absolute;
  width: 36px;
  height: 134px;
  background: linear-gradient(180deg, #2a1a4e 0%, #1a0e2e 100%);
  border: 2px solid #0a0520;
  border-radius: 0;
  cursor: pointer;
  pointer-events: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding-bottom: 6px;
  transition:
    background 0.06s,
    transform 0.04s;
  box-shadow:
    2px 2px 0 rgba(0,0,0,0.4),
    inset 0 -3px 4px rgba(255,255,255,0.04);
}

.black-key:hover {
  background: linear-gradient(180deg, #3a2a5e 0%, #2a1a3e 100%);
}

.black-key.active {
  background: linear-gradient(180deg, #FF85B3 0%, #FF6B9D 100%);
  transform: translateY(3px);
  box-shadow:
    1px 1px 0 rgba(0,0,0,0.3),
    inset 0 -1px 0 rgba(255,107,157,0.3),
    0 0 12px rgba(255,107,157,0.4);
  border-color: #cc5590;
}

.black-key .key-label {
  color: #665a80;
  font-size: 7px;
  font-family: 'Press Start 2P', monospace;
}
.black-key.active .key-label { color: #ffcce0; }

/* Controls — 8-bit style */
.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
  justify-content: center;
}

.controls button {
  padding: 6px 16px;
  background: #1e1a3e;
  border: 3px solid #FF6B9D;
  border-radius: 0;
  color: #FF85B3;
  cursor: pointer;
  font-size: 14px;
  font-family: 'Press Start 2P', monospace;
  box-shadow: 2px 2px 0 rgba(255,107,157,0.3);
  transition: all 0.08s;
  image-rendering: pixelated;
}

.controls button:hover {
  background: #2d1b4e;
  border-color: #6BC5FF;
  color: #6BC5FF;
  box-shadow: 1px 1px 0 rgba(107,197,255,0.3);
  transform: translate(1px, 1px);
}

.controls button:active {
  transform: translate(2px, 2px);
  box-shadow: none;
}

.controls .octave-display {
  color: #C084FC;
  font-size: 10px;
  font-family: 'Press Start 2P', monospace;
  min-width: 70px;
  text-align: center;
  text-shadow: 0 0 8px rgba(192,132,252,0.3);
}

.volume-slider {
  -webkit-appearance: none;
  appearance: none;
  height: 8px;
  background: #2a1a3e;
  border: 2px solid #FF6B9D;
  border-radius: 0;
  outline: none;
  width: 80px;
}
.volume-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 12px;
  height: 18px;
  background: #6BC5FF;
  border: 2px solid #4a8abf;
  cursor: pointer;
  box-shadow: 0 0 6px rgba(107,197,255,0.4);
  border-radius: 0;
}

.volume-label {
  color: #B3E4FF;
  font-size: 8px;
  font-family: 'Press Start 2P', monospace;
}

/* Instrument select — pixel style */
.instrument-select {
  background: #1e1a3e;
  border: 3px solid #6BC5FF;
  border-radius: 0;
  color: #6BC5FF;
  padding: 6px 10px;
  font-size: 8px;
  font-family: 'Press Start 2P', monospace;
  cursor: pointer;
  outline: none;
  max-width: 200px;
  box-shadow: 2px 2px 0 rgba(107,197,255,0.2);
}
.instrument-select option {
  background: #1a1a3e;
  color: #B3E4FF;
}
.instrument-select:hover {
  border-color: #FF6B9D;
  color: #FF85B3;
}

/* Status bar */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 14px;
  gap: 16px;
  padding: 8px 18px;
  border: 2px solid rgba(107,197,255,0.2);
  background: rgba(26,26,62,0.5);
}

.status-bar .status {
  color: #FF85B3;
  font-size: 8px;
  font-family: 'Press Start 2P', monospace;
  text-shadow: 0 0 6px rgba(255,133,179,0.3);
}

.status-bar .hint {
  color: #7a6a90;
  font-size: 7px;
  font-family: 'Press Start 2P', monospace;
  letter-spacing: 0.5px;
}

.status-bar .hint kbd {
  display: inline-block;
  padding: 2px 5px;
  background: #2a1a3e;
  border: 1px solid #6BC5FF;
  border-radius: 0;
  font-size: 7px;
  font-family: 'Press Start 2P', monospace;
  color: #B3E4FF;
  margin: 0 2px;
  box-shadow: 0 0 4px rgba(107,197,255,0.15);
}

/* ===== Top Navigation ===== */
.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: linear-gradient(180deg, #1a1a3e 0%, #16122a 100%);
  border-bottom: 4px solid #6BC5FF;
  box-shadow: 0 2px 16px rgba(107,197,255,0.15);
  z-index: 1001;
  font-family: 'Press Start 2P', monospace;
}
.top-nav .nav-brand {
  color: #FF85B3;
  font-size: 14px;
  letter-spacing: 3px;
  text-shadow: 0 0 8px rgba(255,107,157,0.4);
}
.top-nav .nav-links {
  display: flex;
  align-items: center;
  gap: 16px;
}
.top-nav .nav-links a {
  color: #6BC5FF;
  font-size: 8px;
  text-decoration: none;
  letter-spacing: 1px;
  padding: 4px 8px;
  border: 2px solid transparent;
  transition: all 0.1s;
}
.top-nav .nav-links a:hover {
  border-color: #FF6B9D;
  color: #FF85B3;
}
#lang-toggle {
  background: #1e1a3e;
  border: 3px solid #FF6B9D;
  border-radius: 0;
  color: #FF85B3;
  cursor: pointer;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  padding: 6px 14px;
  transition: all 0.08s;
  box-shadow: 2px 2px 0 rgba(255,107,157,0.3);
  image-rendering: pixelated;
}
#lang-toggle:hover {
  background: #2d1b4e;
  border-color: #6BC5FF;
  color: #6BC5FF;
  transform: translate(1px, 1px);
  box-shadow: 1px 1px 0 rgba(107,197,255,0.3);
}
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">♪ M U S I O N</div>
  <div class="nav-links">
    <a href="#" data-lang="navHome">首页</a>

</nav>

    { value: 'acoustic_guitar_nylon',      label: '\u5c3c\u9f99\u5f26\u5409\u4ed6', en: 'Nylon Guitar' },
    { value: 'acoustic_guitar_steel',      label: '\u94a2\u5f26\u5409\u4ed6', en: 'Steel Guitar' },
    { value: 'electric_guitar_jazz',       label: '\u7235\u58eb\u7535\u5409\u4ed6', en: 'Jazz Guitar' },
    { value: 'electric_guitar_clean',      label: '\u6e05\u97f3\u7535\u5409\u4ed6', en: 'Clean Guitar' },
    { value: 'overdriven_guitar',          label: '\u8fc7\u8f7d\u5409\u4ed6', en: 'Overdrive Guitar' },
    { value: 'distortion_guitar',          label: '\u5931\u771f\u5409\u4ed6', en: 'Dist. Guitar' },
    { value: 'acoustic_bass',              label: '\u539f\u58f0\u8d1d\u65af', en: 'Acoustic Bass' },
    { value: 'electric_bass_finger',       label: '\u6307\u5f39\u8d1d\u65af', en: 'Finger Bass' },
    { value: 'violin',                     label: '\u5c0f\u63d0\u7434', en: 'Violin' },
    { value: 'viola',                      label: '\u4e2d\u63d0\u7434', en: 'Viola' },
    { value: 'cello',                      label: '\u5927\u63d0\u7434', en: 'Cello' },
    { value: 'contrabass',                 label: '\u4f4e\u97f3\u63d0\u7434', en: 'Contrabass' },
    { value: 'pizzicato_strings',          label: '\u62e8\u5f26\u5f26\u4e50', en: 'Pizzicato' },
    { value: 'orchestral_harp',            label: '\u7ad6\u7434', en: 'Harp' },
    { value: 'string_ensemble_1',          label: '\u5f26\u4e50\u5408\u594f', en: 'String Ens.' },
    { value: 'trumpet',                    label: '\u5c0f\u53f7', en: 'Trumpet' },
    { value: 'trombone',                   label: '\u957f\u53f7', en: 'Trombone' },
    { value: 'french_horn',                label: '\u5706\u53f7', en: 'French Horn' },
    { value: 'brass_section',              label: '\u94dc\u7ba1\u7ec4', en: 'Brass Section' },
    { value: 'soprano_sax',                label: '\u9ad8\u97f3\u8428\u514b\u65af', en: 'Soprano Sax' },
    { value: 'alto_sax',                   label: '\u4e2d\u97f3\u8428\u514b\u65af', en: 'Alto Sax' },
    { value: 'tenor_sax',                  label: '\u6b21\u4e2d\u97f3\u8428\u514b\u65af', en: 'Tenor Sax' },
    { value: 'oboe',                       label: '\u53cc\u7bf3\u7ba1', en: 'Oboe' },
    { value: 'clarinet',                   label: '\u5355\u7bf3\u7ba1', en: 'Clarinet' },
    { value: 'piccolo',                    label: '\u77ed\u7b1b', en: 'Piccolo' },
    { value: 'flute',                      label: '\u957f\u7b1b', en: 'Flute' },
    { value: 'pan_flute',                  label: '\u6392\u7bab', en: 'Pan Flute' },
    { value: 'whistle',                    label: '\u53e3\u54e8', en: 'Whistle' },
    { value: 'lead_1_square',             label: '\u65b9\u6ce2\u4e3b\u97f3', en: 'Square Lead' },
    { value: 'lead_2_sawtooth',           label: '\u952f\u9f7f\u4e3b\u97f3', en: 'Sawtooth Lead' },
    { value: 'pad_1_new_age',              label: '\u65b0\u4e16\u7eaa\u6c1b\u56f4', en: 'New Age Pad' },
    { value: 'pad_2_warm',                 label: '\u6e29\u6696\u6c1b\u56f4', en: 'Warm Pad' },
    { value: 'fx_1_rain',                  label: '\u96e8\u58f0\u6548\u679c', en: 'Rain FX' },
    { value: 'synth_drum',                 label: '\u5408\u6210\u9f13', en: 'Synth Drum' }
  ];

  function getInstLabel(inst) {
    return currentLang === 'zh' ? inst.label : (inst.en || inst.label);
  }

  function rebuildInstrumentOptions() {
    var selectedVal = instrumentSelect.value;
    instrumentSelect.innerHTML = '';
    INSTRUMENTS.forEach(function(inst) {
      var opt = document.createElement('option');
      opt.value = inst.value;
      opt.textContent = getInstLabel(inst);
      instrumentSelect.appendChild(opt);
    });
    instrumentSelect.value = selectedVal;
  }

  // --- Helpers ---
  function getNoteName(note) {
    return NOTE_NAMES[note % 12] + (Math.floor(note / 12) - 1);
  }

  function getOctave(note) {
    return Math.floor(note / 12) - 1;
  }

  function getKeyLabel(note, startNote) {
    var offset = note - startNote;
    return OFFSET_TO_KEY[offset] || '';
  }

  // --- Build keyboard ---
  function buildPiano(startNote, endNote) {
    whiteKeysEl.innerHTML = '';
    blackKeysEl.innerHTML = '';

    var whiteKeyWidth = 60;
    var keyStep = whiteKeyWidth - 1;

    // White keys
    for (var n = startNote; n <= endNote; n++) {
      if (BLACK_SEMIS.indexOf(n % 12) >= 0) continue;

      var el = document.createElement('div');
      el.className = 'white-key';
      el.dataset.note = n;

      var keyLabel = getKeyLabel(n, startNote);
      if (keyLabel) {
        var kl = document.createElement('div');
        kl.className = 'key-label';
        kl.textContent = keyLabel.toUpperCase();
        el.appendChild(kl);
      }

      var nl = document.createElement('div');
      nl.className = 'note-label';
      nl.textContent = getNoteName(n);
      el.appendChild(nl);

      el.addEventListener('mousedown', function(e) { e.preventDefault(); noteOn(+this.dataset.note); });
      el.addEventListener('mouseup', function(e) { noteOff(+this.dataset.note); });
      el.addEventListener('mouseleave', function(e) { noteOff(+this.dataset.note); });
      el.addEventListener('touchstart', function(e) { e.preventDefault(); noteOn(+this.dataset.note); });
      el.addEventListener('touchend', function(e) { e.preventDefault(); noteOff(+this.dataset.note); });

      whiteKeysEl.appendChild(el);
    }

    // Black keys
    for (var n2 = startNote; n2 <= endNote; n2++) {
      if (BLACK_SEMIS.indexOf(n2 % 12) < 0) continue;

      var prevWhite = n2 - 1;
      var whiteIdx = 0;
      for (var tn = startNote; tn < prevWhite; tn++) {
        if (BLACK_SEMIS.indexOf(tn % 12) < 0) whiteIdx++;
      }

      var bel = document.createElement('div');
      bel.className = 'black-key';
      bel.dataset.note = n2;
      bel.style.left = (whiteIdx * keyStep + keyStep - 19) + 'px';

      var keyLabel = getKeyLabel(n2, startNote);
      if (keyLabel) {
        var kl2 = document.createElement('div');
        kl2.className = 'key-label';
        kl2.textContent = keyLabel.toUpperCase();
        bel.appendChild(kl2);
      }

      bel.addEventListener('mousedown', function(e) { e.preventDefault(); noteOn(+this.dataset.note); });
      bel.addEventListener('mouseup', function(e) { noteOff(+this.dataset.note); });
      bel.addEventListener('mouseleave', function(e) { noteOff(+this.dataset.note); });
      bel.addEventListener('touchstart', function(e) { e.preventDefault(); noteOn(+this.dataset.note); });
      bel.addEventListener('touchend', function(e) { e.preventDefault(); noteOff(+this.dataset.note); });

      blackKeysEl.appendChild(bel);
    }
  }

  // --- MIDI control ---
  function noteOn(note) {
    if (activeNotes[note]) return;
    activeNotes[note] = true;
    var el = document.querySelector('[data-note="' + note + '"]');
    if (el) el.classList.add('active');
    try { MIDI.noteOn(0, note, 127, 0); } catch(e) {}
  }

  function noteOff(note) {
    if (!activeNotes[note]) return;
    delete activeNotes[note];
    var el = document.querySelector('[data-note="' + note + '"]');
    if (el) el.classList.remove('active');
    try { MIDI.noteOff(0, note, 0); } catch(e) {}
  }

  function allNotesOff() {
    for (var note in activeNotes) noteOff(+note);
    document.querySelectorAll('.active').forEach(function(el) { el.classList.remove('active'); });
  }

  // --- Keyboard input ---
  var heldKeys = {};

  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'ArrowUp') { e.preventDefault(); shiftOctave(1); return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); shiftOctave(-1); return; }
    var key = e.key.toLowerCase();
    if (heldKeys[key]) return;
    if (KEY_MAP[key] !== undefined) {
      e.preventDefault();
      heldKeys[key] = true;
      var note = START_NOTE + octaveOffset * 12 + KEY_MAP[key];
      if (note >= 21 && note <= 108) noteOn(note);
    }
  });

  document.addEventListener('keyup', function(e) {
    var key = e.key.toLowerCase();
    if (KEY_MAP[key] !== undefined) {
      e.preventDefault();
      heldKeys[key] = false;
      var note = START_NOTE + octaveOffset * 12 + KEY_MAP[key];
      if (note >= 21 && note <= 108) noteOff(note);
    }
  });

  window.addEventListener('blur', function() { allNotesOff(); heldKeys = {}; });

  // --- Octave shifting ---
  function shiftOctave(dir) {
    var newOffset = octaveOffset + dir;
    var minOffset = Math.ceil((21 - START_NOTE) / 12);
    var maxOffset = Math.floor((108 - END_NOTE) / 12);
    if (newOffset < minOffset || newOffset > maxOffset) return;
    allNotesOff();
    heldKeys = {};
    octaveOffset = newOffset;
    var start = START_NOTE + octaveOffset * 12;
    var end = END_NOTE + octaveOffset * 12;
    octaveDisplay.textContent = NOTE_NAMES[start % 12] + getOctave(start) + '\u2013' + NOTE_NAMES[end % 12] + getOctave(end);
    buildPiano(start, end);
  }

  // --- Volume ---
  volumeSlider.addEventListener('input', function() {
    try { MIDI.setVolume(0, +this.value); } catch(e) {}
  });

  // --- Instrument switching ---
  instrumentSelect.addEventListener('change', function() {
    allNotesOff();
    loadInstrument(this.value);
  });

  function loadInstrument(inst) {
    var instObj = INSTRUMENTS.filter(function(i) { return i.value === inst; })[0] || {};
    var label = getInstLabel(instObj) || inst;
    var loadingPrefix = currentLang === 'zh' ? '\u52a0\u8f7d ' : 'Loading ';
    statusEl.textContent = loadingPrefix + label + '...';
    loadingContainer.style.opacity = 1;
    loadingText.classList.remove('loaded');
    loadingBar.style.width = '0%';
    loadingText.textContent = t('loadingFile');

    MIDI.loadPlugin({
      soundfontUrl: SOUNDFONT_URL,
      instrument: inst,
      targetFormat: 'mp3',
      onprogress: function(state, progress) {
        var pct = Math.round(progress * 100);
        loadingBar.style.width = pct + '%';
        loadingText.textContent = t('loadingProgress') + pct + '%';
      },
      onsuccess: function() {
        var program = MIDI.GM.byName[inst].number;
        MIDI.programChange(0, program);
        loadingBar.style.width = '100%';
        loadingText.textContent = t('loaded');
        loadingText.classList.add('loaded');
        statusEl.textContent = t('readyPrefix') + label;
        setTimeout(function() { loadingContainer.style.opacity = 0; }, 1500);
      }
    });
  }

  // --- Language toggle ---
  document.getElementById('lang-toggle').addEventListener('click', function() {
    currentLang = currentLang === 'zh' ? 'en' : 'zh';
    applyLang();
    // Update status bar instrument label
    var curInst = instrumentSelect.value;
    if (curInst) {
      var instObj = INSTRUMENTS.filter(function(i) { return i.value === curInst; })[0] || {};
      var label = getInstLabel(instObj) || curInst;
      var st = statusEl.textContent;
      if (st.indexOf('\u5c31\u7eea') === 0 || st.indexOf('Ready') === 0) {
        statusEl.textContent = t('readyPrefix') + label;
      }
    }
  });

  // --- Init ---
  function init() {
    try { MIDI.setVolume(0, +volumeSlider.value); } catch(e) {}
    buildPiano(START_NOTE, END_NOTE);
    applyLang(); // ensure initial language state
    loadInstrument('acoustic_grand_piano');
  }

  document.getElementById('octave-down').addEventListener('click', function() { shiftOctave(-1); });
  document.getElementById('octave-up').addEventListener('click', function() { shiftOctave(1); });

  if (document.readyState === 'complete') init();
  else window.addEventListener('load', init);
})();
</script>
