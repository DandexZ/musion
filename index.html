<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Musion - MIDI 钢琴</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/piano.css">
<link rel="stylesheet" href="css/controls.css">
<link rel="stylesheet" href="css/navigation.css">
<script src="lib/inc/shim/Base64.js"></script>
<script src="lib/inc/shim/Base64binary.js"></script>
<script src="lib/inc/shim/WebAudioAPI.js"></script>
<script src="lib/js/midi/audioDetect.js"></script>
<script src="lib/js/midi/gm.js"></script>
<script src="lib/js/midi/loader.js"></script>
<script src="lib/js/midi/plugin.audiotag.js"></script>
<script src="lib/js/midi/plugin.webaudio.js"></script>
<script src="lib/js/midi/plugin.webmidi.js"></script>
<script src="lib/js/util/dom_request_xhr.js"></script>
<script src="lib/js/util/dom_request_script.js"></script>
<script src="js/config.js"></script>
<script src="js/keyboard.js"></script>
<script src="js/midi.js"></script>
<script src="js/input.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand">♪ M U S I O N</div>
  <div class="nav-links">
    <a href="#" data-lang="navHome">首页</a>
    <a href="https://github.com/DandexZ/musion" target="_blank" data-lang="navGithub">GitHub</a>
    <button id="lang-toggle" data-lang="langBtn">EN</button>
  </div>
</nav>

<div class="header">
  <h1><span data-lang="h1Span">MIDI</span> <span data-lang="h1Text">钢琴</span></h1>
  <div class="subtitle" data-lang="subtitle">musion · FluidR3_GM · 基于 MIDI.js</div>
  <div id="loading-bar-container">
    <div id="loading-bar"></div>
  </div>
  <div id="loading-text" data-lang="loadingSoundfont">正在加载音色库...</div>
</div>

<div class="controls">
  <button id="octave-down">−</button>
  <span class="octave-display" id="octave-display">C3–B5</span>
  <button id="octave-up">+</button>
  <span class="volume-label" data-lang="volume">音量</span>
  <input type="range" class="volume-slider" id="volume-slider" min="0" max="127" value="100">
  <select class="instrument-select" id="instrument-select"></select>
</div>

<div class="piano-container">
  <div class="brand-tag">♪ M U S I O N ♪</div>
  <div class="piano-wrapper" id="piano-wrapper">
    <div class="white-keys" id="white-keys"></div>
    <div class="black-keys" id="black-keys"></div>
  </div>
</div>

<div class="status-bar">
    <div class="status" id="status" data-lang="statusReady">就绪</div>
  <div class="hint" data-lang="hint">↑↓ 八度 · 鼠标/键盘弹奏 · 55 种 GM 音色</div>
</div>

</body>
</html>
